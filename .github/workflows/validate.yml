name: Validar MoorePrint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
      SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
      SUPABASE_TEST_EMAIL: ${{ secrets.SUPABASE_TEST_EMAIL }}
      SUPABASE_TEST_PASSWORD: ${{ secrets.SUPABASE_TEST_PASSWORD }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Revisar sintaxis JavaScript
        run: |
          for file in *.js; do
            echo "Revisando $file"
            node --check "$file"
          done
          for file in tests/*.js; do
            echo "Revisando $file"
            node --check "$file"
          done

      - name: Revisar archivos e identificadores de la interfaz
        run: |
          node <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const scripts = [...html.matchAll(/<script\s+src="([^"]+)"/g)].map(match => match[1]);
          const missingScripts = scripts.filter(file => !fs.existsSync(file));
          if (missingScripts.length) throw new Error(`Scripts faltantes: ${missingScripts.join(', ')}`);

          const dynamicLoaders = ['app.js', 'advanced-fixes.js', 'performance-fixes.js', 'select-innerhtml-stability.js']
            .filter(file => fs.existsSync(file))
            .map(file => fs.readFileSync(file, 'utf8'))
            .join('\n');
          const dynamicallyLoaded = [...dynamicLoaders.matchAll(/(?:loadScriptOnce|loadScript)\(['"]([^'"]+)['"]/g)]
            .map(match => match[1])
            .filter(file => !file.startsWith('http'));
          const missingDynamic = dynamicallyLoaded.filter(file => !fs.existsSync(file));
          if (missingDynamic.length) throw new Error(`Scripts dinámicos faltantes: ${missingDynamic.join(', ')}`);

          const allScripts = [...new Set([...scripts, ...dynamicallyLoaded])];
          const js = allScripts.map(file => fs.readFileSync(file, 'utf8')).join('\n');
          const staticIds = new Set([...html.matchAll(/\bid="([^"]+)"/g)].map(match => match[1]));
          const dynamicIds = new Set([...js.matchAll(/\bid=\\?"([^"$]+)\\?"/g)].map(match => match[1]));
          const referenced = new Set([
            ...[...js.matchAll(/\$\('#([^']+)'\)/g)].map(match => match[1]),
            ...[...js.matchAll(/\$\("#([^"]+)"\)/g)].map(match => match[1])
          ]);
          const missingIds = [...referenced].filter(id => !staticIds.has(id) && !dynamicIds.has(id));
          if (missingIds.length) throw new Error(`Identificadores faltantes: ${missingIds.join(', ')}`);

          console.log(`Validación correcta: ${allScripts.length} scripts, ${staticIds.size} identificadores estáticos y ${dynamicIds.size} dinámicos.`);
          NODE

      - name: Instalar Playwright y Supabase
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Probar permisos, transacciones, cola y conexión
        run: npm test

      - name: Guardar resultados de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results
          if-no-files-found: ignore
