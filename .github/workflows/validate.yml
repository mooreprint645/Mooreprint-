name: Validar MoorePrint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
      SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
      SUPABASE_TEST_EMAIL: ${{ secrets.SUPABASE_TEST_EMAIL }}
      SUPABASE_TEST_PASSWORD: ${{ secrets.SUPABASE_TEST_PASSWORD }}
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Revisar sintaxis JavaScript
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(
            find . -maxdepth 1 -type f -name '*.js' -print0
            if [ -d scripts ]; then find scripts -type f -name '*.js' -print0; fi
            if [ -d tests ]; then find tests -type f -name '*.js' -print0; fi
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No se encontraron archivos JavaScript para revisar."
            exit 0
          fi

          for file in "${files[@]}"; do
            echo "Revisando ${file#./}"
            node --check "$file"
          done

      - name: Revisar organización y skills
        run: npm run test:skills

      - name: Revisar archivos e identificadores de la interfaz
        run: |
          node <<'NODE'
          const fs = require('fs');

          const normalizeLocalPath = value => String(value || '')
            .split('#')[0]
            .split('?')[0]
            .replace(/^\.\//, '');

          const isExternal = value => /^(?:https?:)?\/\//.test(value) || /^(?:data|blob):/.test(value);
          const existingFile = value => {
            const normalized = normalizeLocalPath(value);
            return normalized && fs.existsSync(normalized) && fs.statSync(normalized).isFile();
          };

          const scriptReferences = source => {
            const references = new Set();
            for (const pattern of [
              /(?:loadScriptOnce|loadScript)\(\s*['"]([^'"]+)['"]/g,
              /\.src\s*=\s*['"]([^'"]+)['"]/g
            ]) {
              for (const match of source.matchAll(pattern)) {
                if (!isExternal(match[1])) references.add(normalizeLocalPath(match[1]));
              }
            }
            return [...references].filter(Boolean);
          };

          const html = fs.readFileSync('index.html', 'utf8');
          const declaredScripts = [...html.matchAll(/<script\b[^>]*\bsrc=['"]([^'"]+)['"]/g)]
            .map(match => match[1]);
          const localScripts = declaredScripts
            .filter(file => !isExternal(file))
            .map(normalizeLocalPath);
          const missingScripts = localScripts.filter(file => !existingFile(file));
          if (missingScripts.length) throw new Error(`Scripts faltantes en index.html: ${missingScripts.join(', ')}`);

          const reachableScripts = new Set();
          const pending = [...localScripts];
          while (pending.length) {
            const file = pending.shift();
            if (!file || reachableScripts.has(file)) continue;
            if (!existingFile(file)) throw new Error(`Script dinámico faltante: ${file}`);
            reachableScripts.add(file);
            const source = fs.readFileSync(file, 'utf8');
            for (const dependency of scriptReferences(source)) {
              if (!reachableScripts.has(dependency)) pending.push(dependency);
            }
          }

          if (fs.existsSync('sw.js')) {
            const serviceWorker = fs.readFileSync('sw.js', 'utf8');
            const shellMatch = serviceWorker.match(/const\s+APP_SHELL\s*=\s*\[([\s\S]*?)\];/);
            if (!shellMatch) throw new Error('No se pudo localizar APP_SHELL en sw.js.');
            const shellFiles = [...shellMatch[1].matchAll(/['"]([^'"]+)['"]/g)]
              .map(match => match[1])
              .filter(file => !isExternal(file))
              .map(normalizeLocalPath)
              .filter(file => file && file !== '.');
            const missingShellFiles = shellFiles.filter(file => !existingFile(file));
            if (missingShellFiles.length) throw new Error(`Archivos faltantes en APP_SHELL: ${missingShellFiles.join(', ')}`);
          }

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const missingScriptTargets = [];
          for (const [name, command] of Object.entries(packageJson.scripts || {})) {
            for (const match of String(command).matchAll(/(?:^|\s)((?:tests|scripts)\/[\w./-]+\.js)(?=\s|$)/g)) {
              if (!existingFile(match[1])) missingScriptTargets.push(`${name}: ${match[1]}`);
            }
          }
          if (missingScriptTargets.length) {
            throw new Error(`Archivos referenciados en package.json que no existen: ${missingScriptTargets.join(', ')}`);
          }

          const allScripts = [...reachableScripts];
          const js = allScripts.map(file => fs.readFileSync(file, 'utf8')).join('\n');
          const staticIds = new Set([...html.matchAll(/\bid=['"]([^'"]+)['"]/g)].map(match => match[1]));
          const dynamicIds = new Set([...js.matchAll(/\bid=\\?['"]([^'"$]+)\\?['"]/g)].map(match => match[1]));
          const referenced = new Set([
            ...[...js.matchAll(/\$\('#([^']+)'\)/g)].map(match => match[1]),
            ...[...js.matchAll(/\$\("#([^"]+)"\)/g)].map(match => match[1])
          ]);
          const missingIds = [...referenced].filter(id => !staticIds.has(id) && !dynamicIds.has(id));
          if (missingIds.length) throw new Error(`Identificadores faltantes: ${missingIds.join(', ')}`);

          const tests = fs.existsSync('tests')
            ? fs.readdirSync('tests').filter(file => file.endsWith('.js')).length
            : 0;
          console.log(`Validación correcta: ${allScripts.length} scripts alcanzables, ${tests} pruebas JavaScript, ${staticIds.size} identificadores estáticos y ${dynamicIds.size} dinámicos.`);
          NODE

      - name: Instalar dependencias
        run: npm ci --no-audit --no-fund

      - name: Instalar navegador de Playwright
        run: npx playwright install --with-deps chromium

      - name: Probar permisos, transacciones, cola y conexión
        run: npm test

      - name: Guardar resultados de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results
          if-no-files-found: ignore
